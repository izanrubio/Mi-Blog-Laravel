<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">

  <!-- Icono: llaves de código con L -->
  <g transform="translate(0, 8)">
    <!-- Llave izquierda { -->
    <path d="M18 8 Q10 8 10 16 L10 24 Q10 32 4 32 Q10 32 10 40 L10 48 Q10 56 18 56" 
          fill="none" stroke="#FF2D20" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Llave derecha } -->
    <path d="M38 8 Q46 8 46 16 L46 24 Q46 32 52 32 Q46 32 46 40 L46 48 Q46 56 38 56" 
          fill="none" stroke="#FF2D20" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- L en el centro -->
    <text x="22" y="39" font-family="'Courier New', monospace" font-size="22" font-weight="900" fill="#FF2D20">L</text>
  </g>

  <!-- Separador -->
  <line x1="72" y1="16" x2="72" y2="64" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Texto LARAVEL -->
  <text x="86" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="24" font-weight="800" fill="#111827" letter-spacing="-0.5">Laravel</text>

  <!-- Texto EN ESPAÑOL -->
  <text x="87" y="57" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="10.5" font-weight="500" fill="#FF2D20" letter-spacing="4">EN ESPAÑOL</text>

</svg>
